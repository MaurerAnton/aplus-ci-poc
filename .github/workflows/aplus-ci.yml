name: A+ CI

on:
  push:
    paths:
      - '**.a+'
      - '.github/workflows/aplus-ci.yml'
      - 'fuzz_aplus.py'
      - 'Dockerfile'
  pull_request:
    paths:
      - '**.a+'
      - '.github/workflows/aplus-ci.yml'
      - 'fuzz_aplus.py'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    name: Build A+ interpreter (Docker)
    runs-on: ubuntu-latest
    outputs:
      image: aplus:ci
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aplus:ci .

      - name: Smoke test
        run: |
          echo '1+2' | docker run --rm -i aplus:ci || true

      - name: Export interpreter binary
        run: |
          mkdir -p aplus-install/bin
          docker run --rm --entrypoint="" -v $PWD/aplus-install:/out aplus:ci \
            sh -c 'cp /opt/aplus/bin/a+ /out/bin/ && cp -r /opt/aplus/lib /out/ 2>/dev/null || true'
          chmod +x aplus-install/bin/a+
          ls -la aplus-install/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install/
          retention-days: 1

  run-programs:
    name: Run A+ programs
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install

      - name: Make executable
        run: chmod +x aplus-install/bin/a+

      - name: Run all .a+ files
        run: |
          A=aplus-install/bin/a+
          for f in *.a+; do
            echo "========================================="
            echo "=== $f"
            echo "========================================="
            "$A" "$f" || true
            echo ""
          done

  neural-network:
    name: Neural network demo
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install
      - run: chmod +x aplus-install/bin/a+
      - name: Run nn.a+
        run: |
          echo "=== 2-Layer Neural Net in A+ ==="
          aplus-install/bin/a+ nn.a+ || true

  fuzz:
    name: Fuzz test interpreter
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install
      - run: chmod +x aplus-install/bin/a+
      - name: Run fuzzer (smoke + 50 iterations)
        run: |
          python3 fuzz_aplus.py aplus-install/bin/a+ \
            --seed 12345 -n 50 --timeout 5 --report fuzz-report.txt
      - uses: actions/upload-artifact@v4
        with:
          name: fuzz-report
          path: fuzz-report.txt
