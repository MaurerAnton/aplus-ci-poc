name: A+ CI

on:
  push:
    paths:
      - '**.a+'
      - '.github/workflows/aplus-ci.yml'
      - 'fuzz_aplus.py'
      - 'Dockerfile'
  pull_request:
    paths:
      - '**.a+'
      - '.github/workflows/aplus-ci.yml'
      - 'fuzz_aplus.py'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-interpreter:
    name: Build A+ interpreter
    runs-on: ubuntu-22.04
    outputs:
      prefix: ${{ steps.build.outputs.prefix }}
    steps:
      - name: Check out A+ interpreter source
        uses: actions/checkout@v4
        with:
          repository: louyx/aplus
          path: aplus-src

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make xorg-dev

      - name: Patch for modern glibc
        run: |
          # sys_nerr/sys_errlist removed in glibc >= 2.32
          # Replace all occurrences across the source tree
          find aplus-src -type f \( -name '*.c' -o -name '*.C' -o -name '*.h' -o -name '*.H' \) \
            -exec sed -i 's/(errno<sys_nerr)?sys_errlist\[errno\]:"unknown error"/strerror(errno)/g' {} \;
          find aplus-src -type f \( -name '*.c' -o -name '*.C' -o -name '*.h' -o -name '*.H' \) \
            -exec sed -i 's/sys_errlist\[errno\]/strerror(errno)/g' {} \;

      - name: Configure and build
        id: build
        run: |
          PREFIX=$PWD/aplus-install
          cd aplus-src
          CFLAGS="-Wno-error -fpermissive" \
            CXXFLAGS="-std=gnu++98 -Wno-error -fpermissive" \
            ./configure --prefix="$PREFIX"
          make -j$(nproc)
          make install
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          echo '1+2' | timeout 5 ${{ steps.build.outputs.prefix }}/bin/a+ || true

      - name: Upload interpreter artifact
        uses: actions/upload-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install/
          retention-days: 1

  docker:
    name: Build Docker image
    runs-on: ubuntu-22.04
    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aplus:ci .

      - name: Test Docker image
        run: |
          echo "=== Docker: inline expression ==="
          echo '2+3' | docker run --rm -i aplus:ci || true

  run-programs:
    name: Run A+ programs
    runs-on: ubuntu-22.04
    needs: build-interpreter
    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Download interpreter artifact
        uses: actions/download-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install

      - name: Make interpreter executable
        run: chmod +x aplus-install/bin/a+

      - name: Run A+ programs
        run: |
          A=aplus-install/bin/a+
          for f in *.a+; do
            echo "========================================="
            echo "=== Running: $f"
            echo "========================================="
            "$A" "$f"
            echo ""
            echo "=== Exit code: $? ==="
            echo ""
          done

  neural-network:
    name: Neural network demo
    runs-on: ubuntu-22.04
    needs: build-interpreter
    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Download interpreter artifact
        uses: actions/download-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install

      - name: Make interpreter executable
        run: chmod +x aplus-install/bin/a+

      - name: Run neural network
        run: |
          echo "========================================="
          echo "=== 2-Layer Neural Net in A+ ==="
          echo "========================================="
          aplus-install/bin/a+ nn.a+
          echo ""
          echo "=== Exit code: $? ==="

  fuzz:
    name: Fuzz test interpreter
    runs-on: ubuntu-22.04
    needs: build-interpreter
    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Download interpreter artifact
        uses: actions/download-artifact@v4
        with:
          name: aplus-interpreter
          path: aplus-install

      - name: Make interpreter executable
        run: chmod +x aplus-install/bin/a+

      - name: Run fuzzer (smoke + 100 iterations)
        run: |
          python3 fuzz_aplus.py aplus-install/bin/a+ \
            --seed 12345 -n 100 --timeout 5 --report fuzz-report.txt

      - name: Upload fuzz report
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-report
          path: fuzz-report.txt
          retention-days: 7
